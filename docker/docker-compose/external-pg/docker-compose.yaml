# Docker Compose file for Hindsight with PostgreSQL and pgvector
#
# Make sure to set the required environment variables before running:
# - HINDSIGHT_DB_PASSWORD: Password for the PostgreSQL user
# - Configure LLM provider variables as needed (see below in the hindsight service)
#
# Usage:
# docker compose up -d
#
# Optional environment variables with defaults:
# - HINDSIGHT_VERSION: Hindsight application version (default: latest)
# - HINDSIGHT_DB_USER: PostgreSQL user (default: hindsight_user)
# - HINDSIGHT_DB_NAME: PostgreSQL database name (default: hindsight_db)
# - HINDSIGHT_DB_VERSION: PostgreSQL version (default: 18)

services:
  db:
    # Use a PostgreSQL-Image with pgvector extension pre-installed
    # see https://hub.docker.com/r/pgvector/pgvector 
    image: pgvector/pgvector:pg${HINDSIGHT_DB_VERSION:-18}
    container_name: hindsight-db
    restart: unless-stopped
    # Expose PostgreSQL port
    # ports:
      # - "5432:5432"
    environment:
      POSTGRES_USER: ${HINDSIGHT_DB_USER:-hindsight_user}
      POSTGRES_PASSWORD: ${HINDSIGHT_DB_PASSWORD:?Please set the HINDSIGHT_DB_PASSWORD env variable}
      POSTGRES_DB: ${HINDSIGHT_DB_NAME:-hindsight_db}
      POSTGRES_NON_ROOT_USER: ${HINDSIGHT_DB_NON_ROOT_USER:-hindsight_non_root_user}
      POSTGRES_NON_ROOT_PASSWORD: ${HINDSIGHT_DB_NON_ROOT_PASSWORD:?Please set the HINDSIGHT_DB_NON_ROOT_PASSWORD env variable}
    volumes:
      - pg_data:/var/lib/postgresql/${HINDSIGHT_DB_VERSION:-18}/docker
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    networks:
      - hindsight-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${HINDSIGHT_DB_USER:-hindsight_user} -d ${HINDSIGHT_DB_NAME:-hindsight_db}']
      interval: 5s
      timeout: 5s
      retries: 10

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:${HINDSIGHT_VERSION:-0.6.1}
    container_name: hindsight-app
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      - HINDSIGHT_API_LLM_API_KEY=${OPENAI_API_KEY:-NO}
      - HINDSIGHT_API_DATABASE_URL=postgresql://${HINDSIGHT_DB_USER:-hindsight_user}:${HINDSIGHT_DB_PASSWORD:?Please set the HINDSIGHT_DB_PASSWORD env variable}@db:5432/${HINDSIGHT_DB_NAME:-hindsight_db}
      - HINDSIGHT_API_LLM_PROVIDER=${HINDSIGHT_API_LLM_PROVIDER:-ollama}
      - HINDSIGHT_API_LLM_BASE_URL=${HINDSIGHT_API_LLM_BASE_URL}
      - HINDSIGHT_API_LLM_MODEL=${HINDSIGHT_API_LLM_MODEL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hindsight-net

  # ref https://github.com/n8n-io/n8n-hosting/tree/main/docker-compose/withPostgres
  # https://hub.docker.com/r/n8nio/n8n/tags
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-2.20.9}
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${HINDSIGHT_DB_NAME:-hindsight_db}
      - DB_POSTGRESDB_USER=${HINDSIGHT_DB_NON_ROOT_USER:-hindsight_non_root_user}
      - DB_POSTGRESDB_PASSWORD=${HINDSIGHT_DB_NON_ROOT_PASSWORD:?Please set the HINDSIGHT_DB_NON_ROOT_PASSWORD env variable}
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:?Please set the N8N_RUNNERS_AUTH_TOKEN env variable}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
    ports:
      - 5678:5678
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      hindsight:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - hindsight-net

  # https://hub.docker.com/r/n8nio/runners/tags
  n8n-runner:
    image: n8nio/runners:${N8N_VERSION:-2.20.9}
    restart: always
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:?Please set the N8N_RUNNERS_AUTH_TOKEN env variable}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    depends_on:
      - n8n
    networks:
      - hindsight-net

volumes:
  pg_data:
  n8n_data:

networks:
  hindsight-net: